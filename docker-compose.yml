services:
  mysql:
    image: mysql:8.4
    container_name: leileme-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: leileme
      MYSQL_USER: leileme
      MYSQL_PASSWORD: leileme123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: leileme-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: leileme-backend:local
    container_name: leileme-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: leileme
      DB_USER: leileme
      DB_PASSWORD: leileme123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SQL_INIT_MODE: always
      TZ: Asia/Shanghai
      # 登录与微信配置：开发环境默认允许 mock 登录，无需真实微信凭证
      WECHAT_MOCK_ENABLED: ${WECHAT_MOCK_ENABLED:-true}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-leileme-local-dev-jwt-secret-change-me-2026}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql-data:
